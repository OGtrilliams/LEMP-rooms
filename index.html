<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
 <title>Syracuse University ITS | Classroom List</title>
 <link rel="stylesheet" href="https://fastly.cdn.syracuse.edu/dds/latest/dds.min.css">
 <link rel="stylesheet" href="style.css">
 <script src="main.js" defer></script>
</head>
<body>

  <div class="parent">

    <div class="div1">

      <div class="logo">
        <img src="./img/SYRACUSE_Horizontal_2Line_ORANGE_RGB.png" alt="">
    
      </div>
    </div>
    
    <div class="div2">
      <div class="titlepane">
    <h1 class="subtitle">Device & Classroom List</h1>

    <h2 class="subheader">Syracuse University device inventory, searchable and filterable by building and category</h2>
  </div>
</div>

<div class="sidebar div3">

  <div class="toolbar">
    <span class="searchbar">
      <input type="search" id="search" placeholder="Search building, room, name…" /><i class="icon-search text-orange"></i>
    </span>
    <select id="bldg"><option value="">All buildings</option></select>
    <select id="cat"><option value="">All categories</option></select>
    <button class="button-inverse-orange">
      <span class="count" id="count"></span>
    </button>
  </div>
  
</div>

<div class="search-table div4">
  <div class="wrap">
    <div class="tbl-wrap ">
      <table id="tbl ">
        <colgroup><col class="c-bldg"><col class="c-room"><col class="c-cat"><col class="c-name"></colgroup>
        <thead><tr>
          <th data-col="0">Building <span class="arr">↕</span></th>
          <th data-col="1">Room <span class="arr">↕</span></th>
          <th data-col="2">Category <span class="arr">↕</span></th>
          <th data-col="3">Name <span class="arr">↕</span></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<footer class="div5">
      &copy; 2026 - <a href="https://syracuse.edu" target="_blank" rel="noopener noreferrer">Syracuse University <i class="icon-external-link text-orange-dark"></i> </a>. All rights reserved. 
</footer>

</div>


</body>
</html>
