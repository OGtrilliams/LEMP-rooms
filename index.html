<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
 *{
   box-sizing: border-box;
   font-family: "Sherman Sans";
  }

.parent {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 8px;
  max-height: 100vh;
  width: 100%;
}
    
.div2 {
    grid-column: span 2 / span 2;
}

.div3 {
    grid-row: span 2 / span 2;
    grid-row-start: 2;
    height: 100%;
    background-color: #F76900;
    border-radius: 7px;
    padding: 10px 14px;
}

.div4 {
    grid-column: span 2 / span 2;
    grid-row: span 2 / span 2;
    grid-row-start: 2;
    overflow-y: scroll;
}
        
.logo img{
  width: 100%;
}
.titlepane{
text-align: center;
background-color: #000E54;
height: 100%;
border-radius: 12px;
}
.subheader{
  color: #ffffff;
  background-color: #2b72d7;
  font-size: 25px;
}
.subtitle{
color: #ffffff;
font-size: 35px;
}
/*
.div4 { padding: 20px; grid-area: 2 / 2 / 4 / 4; width:100%;border-collapse:auto;table-layout:fixed; overflow-y: scroll; }
*/
.toolbar{
  display: flex;
  flex-direction: column;
  gap: 8px; 
  align-content: center;
}

  .toolbar input{flex:1; font-size: 16px; padding:6px 10px;border:none;border-radius:2px;background:#ffffff;color:#000000;outline:none}
  .toolbar input:focus{box-shadow:0 0 0 2px #000E54}
  .toolbar select{font-size:13px;padding:6px 10px;border:none;border-radius:2px;background:#ffffff;color:#000000;cursor:pointer;outline:none}
  .toolbar select:focus{box-shadow:0 0 0 2px #000E54}
  .count{font-size:24px;color:#ffffff;margin-left:auto;white-space:nowrap;font-weight:400;letter-spacing:0.04em}
  col.c-bldg{width:22%}col.c-room{width:12%}col.c-cat{width:16%}col.c-name{width:14%}
  thead th{background:#000E54;color:#ffffff;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:8px 10px;text-align:left;cursor:pointer;user-select:none;position:sticky;top:0;border-right:1px solid #203299}
  thead th:last-child{border-right:none}
  thead th:hover{background:#203299}
  thead th.sorted{background:#F76900;color:#ffffff}
  th .arr{margin-left:4px;opacity:0.5}
  th.sorted .arr{opacity:1}
  tbody tr td{padding:7px 10px;border-bottom:1px solid #e8e8e8;border-right:1px solid #f0f0f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#000000}
  tbody tr td:last-child{border-right:none}
  tbody tr:nth-child(even) td{background:#fdf3ec}
  tbody tr:hover td{background:#FFE5CC;color:#000000}
  .mono{font-size:12px;color:#404040}
  .empty{text-align:center;color:#707780;padding:2rem;font-style:italic}
  
  </style>

      if(sortCol===c) sortAsc=!sortAsc; else { sortCol=c; sortAsc=true; }
      document.querySelectorAll('thead th').forEach(h => {
        h.classList.remove('sorted');
        h.querySelector('.arr').textContent='↕';
      });
      th.classList.add('sorted');
      th.querySelector('.arr').textContent = sortAsc ? '↑' : '↓';
      render();
    });
  });
  
  function getFiltered() {
    const q = document.getElementById('search').value.toLowerCase();
    const b = bldgSel.value;
    const c = catSel.value;
    return rows.filter(r => {
      if(b && r[0]!==b) return false;
      if(c && r[2]!==c) return false;
      if(q && !r.some(cell => cell.toLowerCase().includes(q))) return false;
      return true;
    });
  }
  
  function render() {
    let data = getFiltered();
    if(sortCol>=0) data=[...data].sort((a,b)=>{
      const v=a[sortCol].localeCompare(b[sortCol]);
      return sortAsc?v:-v;
    });
    const tb = document.getElementById('tbody');
    tb.innerHTML = data.map(r=>`<tr>
      <td title="${r[0]}">${r[0]}</td>
      <td title="${r[1]}">${r[1]}</td>
      <td title="${r[2]}">${r[2]}</td>
      <td class="mono" title="${r[3]}">${r[3]}</td>
    </tr>`).join('');
    if(!data.length) tb.innerHTML='<tr><td colspan="4" class="empty">No results found.</td></tr>';
    document.getElementById('count').textContent = data.length + ' devices';
  }
  
  document.getElementById('search').addEventListener('input', render);
  bldgSel.addEventListener('change', render);
  catSel.addEventListener('change', render);
  render();
  </script>
